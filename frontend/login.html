<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudFeedback Admin Login</title>

    <link rel="stylesheet" href="login.css">
</head>

<body>

    <div class="login-container">

        <div class="login-card">

            <h1>☁️ CloudFeedback</h1>

            <h2>Admin Login</h2>

            <p>Authorized access only</p>

            <form id="loginForm">

                <input
                    type="text"
                    id="username"
                    placeholder="Username"
                    required
                >

                <input
                    type="password"
                    id="password"
                    placeholder="Password"
                    required
                >

                <button type="submit">
                    Login
                </button>

                <div id="errorMessage"></div>

            </form>

        </div>

    </div>

    <script src="login.js"></script>

</body>
</html>
